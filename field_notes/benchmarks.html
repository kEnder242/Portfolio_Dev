<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silicon Benchmarks | Acme Lab</title>
    <meta name="description" content="Multi-Model performance benchmarking: TTFT, ITL, Throughput, and VRAM footprint on RTX 2080 Ti.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=c98a31d0">
    <style>
        /* Modern high-density console styling overrides */
        body {
            background-color: #0b0e14;
        }
        main {
            padding: 30px 40px;
        }
        .console-header {
            border-bottom: 1px solid #1f242c;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .console-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f0f3f6;
            margin: 0 0 5px 0;
            letter-spacing: -0.02em;
        }
        .console-subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #6a737d;
            margin: 0;
        }
        
        /* Telemetry Banner */
        .telemetry-banner {
            background: #12161f;
            border: 1px solid #1f242c;
            border-left: 4px solid var(--accent-color);
            padding: 12px 20px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            color: #8b949e;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .telemetry-item span {
            color: #e6edf3;
            font-weight: 500;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-online {
            background: rgba(63, 185, 80, 0.15);
            color: #3fb950;
            border: 1px solid rgba(63, 185, 80, 0.3);
        }
        .status-fallback {
            background: rgba(247, 129, 102, 0.15);
            color: #f78166;
            border: 1px solid rgba(247, 129, 102, 0.3);
        }

        /* Controls bar */
        .controls-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 30px;
        }
        .console-btn {
            background: #161b22;
            border: 1px solid #21262d;
            color: #c9d1d9;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .console-btn:hover {
            background: #21262d;
            border-color: #30363d;
            color: #fff;
        }

        /* Section layout */
        .section-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #58a6ff;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 30px 0 15px 0;
            border-bottom: 1px solid #1f242c;
            padding-bottom: 8px;
        }

        /* Flexbox Charts */
        .chart-card {
            background: #12161f;
            border: 1px solid #1f242c;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .chart-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            color: #c9d1d9;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chart-subtitle {
            font-size: 0.75rem;
            color: #6a737d;
            font-weight: normal;
        }

        /* Flexbox bar row */
        .bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }
        .bar-row:last-child {
            margin-bottom: 0;
        }
        .bar-label {
            width: 250px;
            color: #e6edf3;
            flex-shrink: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }
        .bar-wrapper {
            flex-grow: 1;
            height: 14px;
            background: #0b0e14;
            border: 1px solid #21262d;
            border-radius: 3px;
            margin: 0 20px;
            overflow: hidden;
            display: flex;
        }
        .bar-fill {
            height: 100%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 2px;
        }
        .bar-value {
            width: 100px;
            text-align: right;
            color: #8b949e;
            flex-shrink: 0;
            font-weight: 700;
        }

        /* Dynamic metrics grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: #12161f;
            border: 1px solid #1f242c;
            border-radius: 6px;
            padding: 20px;
            transition: all 0.2s ease;
        }
        .metric-card:hover {
            border-color: #30363d;
            background: #161b22;
        }
        .card-model-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #f0f3f6;
            margin-bottom: 15px;
            border-bottom: 1px solid #21262d;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-stat {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px dashed #1f242c;
            font-size: 0.8rem;
        }
        .card-stat:last-child {
            border-bottom: none;
        }
        .card-stat-label {
            color: #8b949e;
            font-family: 'JetBrains Mono', monospace;
        }
        .card-stat-value {
            font-family: 'JetBrains Mono', monospace;
            color: #e6edf3;
            font-weight: 500;
        }

        /* Error state */
        .error-console {
            background: rgba(248, 81, 73, 0.05);
            border: 1px solid rgba(248, 81, 73, 0.2);
            border-left: 4px solid #f85149;
            color: #f85149;
            padding: 15px 20px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            margin-bottom: 30px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .bar-row {
                flex-direction: column;
                align-items: flex-start;
                margin-bottom: 20px;
            }
            .bar-label {
                width: 100%;
                margin-bottom: 5px;
            }
            .bar-wrapper {
                width: 100%;
                margin: 5px 0;
            }
            .bar-value {
                width: 100%;
                text-align: left;
                margin-top: 2px;
            }
        }
    </style>
</head>
<body>
    <button id="menu-toggle">☰ MENU</button>

    <nav id="sidebar">
        <mission-control></mission-control>
    </nav>

    <main>
        <div class="console-header">
            <h1 class="console-title">Silicon Benchmarks</h1>
            <p class="console-subtitle">[BKM-045] Multi-Model Telemetry | Real-Time & Fallback Verification</p>
        </div>

        <div class="telemetry-banner">
            <div class="telemetry-item">Platform: <span>RTX 2080 Ti (Local) / RTX 4090 (KENDER)</span></div>
            <div class="telemetry-item">Last Sweep: <span id="telemetry-timestamp">N/A</span></div>
            <div>
                <span id="telemetry-status" class="status-badge" style="background:#1f242c; color:#8b949e;">INIT</span>
            </div>
        </div>

        <div class="controls-bar">
            <button class="console-btn" onclick="loadBenchmarks()">REFRESH TELEMETRY</button>
        </div>

        <div id="benchmark-content">
            <!-- Rendered dynamically via JS -->
            <div style="font-family:'JetBrains Mono', monospace; font-size:0.8rem; color:#8b949e;">
                Bootstrapping console logs...
            </div>
        </div>
    </main>

    <script>
        async function loadBenchmarks() {
            const statusEl = document.getElementById('telemetry-status');
            const timestampEl = document.getElementById('telemetry-timestamp');
            const container = document.getElementById('benchmark-content');
            
            statusEl.textContent = "SYNCHRONIZING...";
            statusEl.className = "status-badge";
            statusEl.style.background = "#1f242c";
            statusEl.style.color = "#8b949e";
            
            try {
                // Fetch dynamic cache file
                const response = await fetch('benchmarks_cache.json?t=' + Date.now());
                if (!response.ok) {
                    throw new Error(`Failed to load benchmarks_cache.json: HTTP ${response.status}`);
                }
                const data = await response.json();
                
                // Update header info
                timestampEl.textContent = data.date_str || new Date(data.timestamp * 1000).toLocaleString();
                
                // Check if any online
                const anyOnline = data.results.some(r => r.status === 'online');
                if (anyOnline) {
                    statusEl.textContent = "ONLINE TELEMETRY";
                    statusEl.className = "status-badge status-online";
                } else {
                    statusEl.textContent = "PRE-CHARACTERIZED FALLBACK";
                    statusEl.className = "status-badge status-fallback";
                }
                
                // Render charts and cards
                renderDashboard(data.results, data);
                
            } catch (err) {
                console.error(err);
                statusEl.textContent = "ERROR";
                statusEl.className = "status-badge status-fallback";
                container.innerHTML = `
                    <div class="error-console">
                        [CRITICAL ERROR] Failed to fetch cache payload.<br>
                        Reason: ${err.message}<br><br>
                        Verify that bench_models.py has executed successfully and generated 'benchmarks_cache.json'.
                    </div>
                `;
            }
        }

        function renderDashboard(results, data) {
            const container = document.getElementById('benchmark-content');
            container.innerHTML = '';
            
            // 1. Render Cards Grid
            let gridHtml = '<div class="metrics-grid">';
            results.forEach(r => {
                const statusClass = r.status === 'online' ? 'status-online' : 'status-fallback';
                const statusText = r.status === 'online' ? 'ONLINE' : 'FALLBACK';
                
                gridHtml += `
                    <div class="metric-card">
                        <div class="card-model-name">
                            <span>${r.model}</span>
                            <span class="status-badge ${statusClass}" style="font-size:0.6rem; padding:1px 5px;">${statusText}</span>
                        </div>
                        <div class="card-stat">
                            <span class="card-stat-label">Engine</span>
                            <span class="card-stat-value">${r.engine}</span>
                        </div>
                        <div class="card-stat">
                            <span class="card-stat-label">TTFT (Time to First Token)</span>
                            <span class="card-stat-value" style="color: #f78166;">${r.ttft_ms.toFixed(0)} ms</span>
                        </div>
                        <div class="card-stat">
                            <span class="card-stat-label">Throughput (Tokens/s)</span>
                            <span class="card-stat-value" style="color: #3fb950;">${r.throughput.toFixed(1)} tok/s</span>
                        </div>
                        <div class="card-stat">
                            <span class="card-stat-label">Inter-Token Latency</span>
                            <span class="card-stat-value" style="color: #d2a8ff;">${r.itl_ms.toFixed(2)} ms</span>
                        </div>
                        <div class="card-stat">
                            <span class="card-stat-label">Peak VRAM footprint</span>
                            <span class="card-stat-value" style="color: #58a6ff;">${r.vram_gb.toFixed(2)} GB</span>
                        </div>
                    </div>
                `;
            });
            gridHtml += '</div>';
            container.innerHTML += gridHtml;
            
            // Calculate maximums for percentages (with safeguards)
            const maxThroughput = Math.max(...results.map(r => r.throughput)) || 1;
            const maxTtft = Math.max(...results.map(r => r.ttft_ms)) || 1;
            const maxItl = Math.max(...results.map(r => r.itl_ms)) || 1;
            
            // 2. Render Charts
            // A. Throughput Chart (Higher is better)
            let throughputHtml = `
                <div class="chart-card">
                    <div class="chart-title">
                        <span>THROUGHPUT COMPARISON</span>
                        <span class="chart-subtitle">Tokens per second (longer is faster)</span>
                    </div>
            `;
            results.forEach(r => {
                const pct = (r.throughput / maxThroughput) * 100;
                throughputHtml += `
                    <div class="bar-row">
                        <div class="bar-label">${r.display_name || r.model}</div>
                        <div class="bar-wrapper">
                            <div class="bar-fill" style="width: ${pct}%; background: linear-gradient(90deg, #2ea043, #3fb950);"></div>
                        </div>
                        <div class="bar-value">${r.throughput.toFixed(1)} tok/s</div>
                    </div>
                `;
            });
            throughputHtml += '</div>';
            container.innerHTML += throughputHtml;

            // B. TTFT Chart (Lower is better, we color-code by latency tier or show absolute latency)
            let ttftHtml = `
                <div class="chart-card">
                    <div class="chart-title">
                        <span>TIME TO FIRST TOKEN (TTFT)</span>
                        <span class="chart-subtitle">Latency in milliseconds (shorter is faster)</span>
                    </div>
            `;
            results.forEach(r => {
                const pct = (r.ttft_ms / maxTtft) * 100;
                // Color coding based on latency
                let color = '#3fb950'; // fast (<300ms)
                if (r.ttft_ms >= 600) {
                    color = '#f85149'; // slow (>=600ms)
                } else if (r.ttft_ms >= 300) {
                    color = '#e3b341'; // medium
                }
                ttftHtml += `
                    <div class="bar-row">
                        <div class="bar-label">${r.display_name || r.model}</div>
                        <div class="bar-wrapper">
                            <div class="bar-fill" style="width: ${pct}%; background: ${color};"></div>
                        </div>
                        <div class="bar-value">${r.ttft_ms.toFixed(0)} ms</div>
                    </div>
                `;
            });
            ttftHtml += '</div>';
            container.innerHTML += ttftHtml;

            // C. Inter-Token Latency (ITL) Chart (Lower is better)
            let itlHtml = `
                <div class="chart-card">
                    <div class="chart-title">
                        <span>INTER-TOKEN LATENCY (ITL)</span>
                        <span class="chart-subtitle">Average delay between successive tokens in milliseconds</span>
                    </div>
            `;
            results.forEach(r => {
                const pct = (r.itl_ms / maxItl) * 100;
                itlHtml += `
                    <div class="bar-row">
                        <div class="bar-label">${r.display_name || r.model}</div>
                        <div class="bar-wrapper">
                            <div class="bar-fill" style="width: ${pct}%; background: linear-gradient(90deg, #8957e5, #d2a8ff);"></div>
                        </div>
                        <div class="bar-value">${r.itl_ms.toFixed(2)} ms</div>
                    </div>
                `;
            });
            itlHtml += '</div>';
            container.innerHTML += itlHtml;

            // D. VRAM Footprint Chart (Lower is better, relative to 11.0 GB card capacity)
            let vramHtml = `
                <div class="chart-card">
                    <div class="chart-title">
                        <span>GPU VRAM CONTEXTUAL FOOTPRINT</span>
                        <span class="chart-subtitle">Active VRAM allocation relative to RTX 2080 Ti physical capacity (11.0 GB)</span>
                    </div>
            `;
            results.forEach(r => {
                const capacity = 11.0;
                const pct = Math.min((r.vram_gb / capacity) * 100, 100);
                vramHtml += `
                    <div class="bar-row">
                        <div class="bar-label">${r.display_name || r.model}</div>
                        <div class="bar-wrapper">
                            <div class="bar-fill" style="width: ${pct}%; background: linear-gradient(90deg, #1f6feb, #58a6ff);"></div>
                        </div>
                        <div class="bar-value">${r.vram_gb.toFixed(2)} GB</div>
                    </div>
                `;
            });
            vramHtml += '</div>';
            container.innerHTML += vramHtml;

            // E. MoE+ Benchmarking Framework
            const moePipeline = data && data.moe_pipeline;
            const moeBenchmark = data && data.moe_benchmark;

            if (!moePipeline && !moeBenchmark) {
                // Neither available — skip silently (no error shown for missing optional data)
                return;
            }

            // --- Pipeline Latency Hiding ---
            if (moePipeline) {
                const p = moePipeline;
                const stages = [
                    { label: 'Intent Classification', start: p.intent_classification_start, end: p.intent_classification_end, color: '#58a6ff' },
                    { label: 'RAG Retrieval', start: p.rag_retrieval_start, end: p.rag_retrieval_end, color: '#8957e5' },
                    { label: 'Workspace Context', start: p.workspace_context_start, end: p.workspace_context_end, color: '#d2a8ff' },
                    { label: 'Model Warming', start: p.model_warming_start, end: p.model_warming_end, color: '#f78166' },
                    { label: 'Prompt Compilation', start: p.prompt_compilation_start, end: p.prompt_compilation_end, color: '#3fb950' },
                    { label: 'Total Pipeline', start: p.total_pipeline_start, end: p.total_pipeline_end, color: '#e3b341' }
                ];

                const maxDuration = Math.max(...stages.map(s => s.end - s.start), 0.001);

                // Calculate latency hidden: min(warming_end, rag_end, ctx_end) - max(rag_start, ctx_start)
                const latencyHidden = Math.max(0,
                    Math.min(p.model_warming_end, p.rag_retrieval_end, p.workspace_context_end) -
                    Math.max(p.rag_retrieval_start, p.workspace_context_start)
                );

                let pipelineHtml = '<div class="section-header">MOE+ BENCHMARKING FRAMEWORK</div>';
                pipelineHtml += `
                    <div class="chart-card">
                        <div class="chart-title">
                            <span>MOE+ PIPELINE LATENCY HIDING</span>
                            <span class="chart-subtitle">Concurrent execution stages (shorter is faster)</span>
                        </div>
                `;

                stages.forEach(s => {
                    const duration = (s.end - s.start).toFixed(3);
                    const pct = maxDuration > 0 ? ((s.end - s.start) / maxDuration) * 100 : 0;
                    pipelineHtml += `
                        <div class="bar-row">
                            <div class="bar-label">${s.label}</div>
                            <div class="bar-wrapper">
                                <div class="bar-fill" style="width: ${pct}%; background: ${s.color};"></div>
                            </div>
                            <div class="bar-value">${duration}s</div>
                        </div>
                    `;
                });

                // Latency hidden highlight
                const hiddenDuration = Math.max(0, latencyHidden).toFixed(3);
                pipelineHtml += `
                    <div style="border: 1px dashed #6a737d; padding: 8px; margin: 8px 0; border-radius: 4px;">
                        <span style="font-size: 0.75rem; color: #6a737d; font-family: 'JetBrains Mono', monospace;">Latency Hidden: ${hiddenDuration}s</span>
                    </div>
                `;

                pipelineHtml += '</div>';
                container.innerHTML += pipelineHtml;
            } else {
                container.innerHTML += `
                    <div class="section-header">MOE+ BENCHMARKING FRAMEWORK</div>
                    <div class="error-console">
                        [MOE+ METRICS UNAVAILABLE] MoE+ benchmarking data could not be loaded. Verify that the benchmarking scripts have executed successfully.
                    </div>
                `;
            }

            // F. MoE+ Routing Benchmark (20 Queries)
            if (moeBenchmark && moeBenchmark.metrics) {
                const latencyMetrics = [
                    { label: 'Router Latency', key: 'avg_router_latency_ms' },
                    { label: 'Warmup Latency', key: 'avg_warmup_latency_ms' },
                    { label: 'Expert Latency', key: 'avg_expert_latency_ms' },
                    { label: 'Total Latency', key: 'avg_total_latency_ms' }
                ];

                let routingHtml = `
                    <div class="chart-card">
                        <div class="chart-title">
                            <span>MOE+ ROUTING BENCHMARK (20 QUERIES)</span>
                            <span class="chart-subtitle">Cold Start vs Warm Start comparison</span>
                        </div>
                `;

                // Accuracy row (text labels)
                const coldAcc = (moeBenchmark.metrics.cold_start.accuracy || 0) * 100;
                const warmAcc = (moeBenchmark.metrics.warm_start.accuracy || 0) * 100;
                routingHtml += `
                    <div class="bar-row">
                        <div class="bar-label">Accuracy</div>
                        <div style="display:flex; flex:1; gap:20px; margin:0 20px; align-items:center;">
                            <div style="flex:1; text-align:center; font-family:'JetBrains Mono',monospace; font-size:0.85rem; color:#f78166; font-weight:700;">${coldAcc.toFixed(1)}%</div>
                            <div style="color:#6a737d; font-size:0.7rem;">vs</div>
                            <div style="flex:1; text-align:center; font-family:'JetBrains Mono',monospace; font-size:0.85rem; color:#3fb950; font-weight:700;">${warmAcc.toFixed(1)}%</div>
                        </div>
                    </div>
                `;

                latencyMetrics.forEach(metric => {
                    const coldVal = (moeBenchmark.metrics.cold_start[metric.key] || 0) / 1000.0;
                    const warmVal = (moeBenchmark.metrics.warm_start[metric.key] || 0) / 1000.0;
                    const maxVal = Math.max(coldVal, warmVal, 0.001);
                    const coldPct = (coldVal / maxVal) * 100;
                    const warmPct = (warmVal / maxVal) * 100;

                    routingHtml += `
                        <div class="bar-row">
                            <div class="bar-label">${metric.label}</div>
                            <div style="display:flex; flex:1; gap:20px; margin:0 20px; align-items:center;">
                                <div style="flex:1; display:flex; align-items:center; gap:6px;">
                                    <span style="font-family:'JetBrains Mono',monospace; font-size:0.65rem; color:#f78166; width:60px; flex-shrink:0;">Cold</span>
                                    <div style="flex:1; height:12px; background:#0b0e14; border:1px solid #21262d; border-radius:3px; overflow:hidden;">
                                        <div class="bar-fill" style="width:${coldPct}%; background:#f78166;"></div>
                                    </div>
                                    <span style="font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:#f78166; width:70px; text-align:right; flex-shrink:0;">${coldVal.toFixed(3)}s</span>
                                </div>
                                <div style="color:#6a737d; font-size:0.7rem; font-family:'JetBrains Mono',monospace;">vs</div>
                                <div style="flex:1; display:flex; align-items:center; gap:6px;">
                                    <span style="font-family:'JetBrains Mono',monospace; font-size:0.65rem; color:#3fb950; width:60px; flex-shrink:0;">Warm</span>
                                    <div style="flex:1; height:12px; background:#0b0e14; border:1px solid #21262d; border-radius:3px; overflow:hidden;">
                                        <div class="bar-fill" style="width:${warmPct}%; background:#3fb950;"></div>
                                    </div>
                                    <span style="font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:#3fb950; width:70px; text-align:right; flex-shrink:0;">${warmVal.toFixed(3)}s</span>
                                </div>
                            </div>
                        </div>
                    `;
                });

                routingHtml += '</div>';
                container.innerHTML += routingHtml;
            }
        }

        // Boot
        window.addEventListener('load', loadBenchmarks);
    </script>
    <script src="mission-control.js?v=06008725"></script>
</body>
</html>
