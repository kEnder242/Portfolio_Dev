<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lab Workbench | Acme Lab</title>
    <link rel="stylesheet" href="style.css?v=8a67fc1a">
    <style>
        main { display: flex; gap: 20px; transition: all 0.3s ease; height: 85vh; }
        #intercom-main { flex: 1; display: flex; flex-direction: column; }
        
        #chat-console {
            background: #000;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-color);
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            font-family: var(--font-stack);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* Tool Log Styles */
        .file { padding-left: 15px; }
        
        /* Tool Log Card Styles */
        #tool-log-section { margin-top: 20px; border-top: 1px solid #222; padding-top: 15px; overflow-y: auto; max-height: 40vh; }
        .tool-log-title { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .tool-log-badge { font-size: 0.6rem; background: #222; color: #888; padding: 1px 6px; border-radius: 8px; }
        .tool-card { margin-bottom: 4px; border: 1px solid #222; border-left: 3px solid var(--accent-color); border-radius: 3px; background: #0a0a0a; }
        .tool-card summary { cursor: pointer; padding: 4px 8px; font-size: 0.72rem; color: #aaa; display: flex; align-items: center; gap: 6px; user-select: none; }
        .tool-card summary:hover { background: #111; }
        .tool-card summary::-webkit-details-marker { color: #555; }
        .tool-card[open] { border-left-color: #4caf50; }
        .tool-card[open] summary { background: #111; color: #ccc; border-bottom: 1px solid #222; }
        .tool-card-body { padding: 6px 8px 8px 24px; font-size: 0.7rem; color: #777; line-height: 1.5; }
        .tool-card-body .param-row { display: flex; gap: 8px; margin-bottom: 2px; }
        .tool-card-body .param-key { color: #555; min-width: 50px; }
        .tool-card-body .param-val { color: #999; font-family: monospace; word-break: break-all; }
        .tool-card-body .output-link { color: var(--accent-color); text-decoration: none; font-size: 0.68rem; }
        .tool-card-body .output-link:hover { text-decoration: underline; }
        .tool-timestamp { color: #555; font-family: monospace; font-size: 0.65rem; min-width: 55px; }
        .tool-node-badge { background: #1a1a2e; color: #7ec8e3; padding: 0 4px; border-radius: 2px; font-size: 0.65rem; }
        .tool-name { color: #ccc; font-weight: bold; }
        .tool-empty { font-size: 0.7rem; color: #444; font-style: italic; padding: 8px; }
    </style>
</head>
<body>
    <button id="menu-toggle">☰ MENU</button>

    <nav id="sidebar">
        <mission-control></mission-control>
        
        <section id="tool-log-section">
            <div class="tool-log-title">🔧 Tool Log <span class="tool-log-badge" id="tool-log-count">0</span></div>
            <div id="tool-log-container">
                <div class="tool-empty">Awaiting tool executions...</div>
            </div>
        </section>
    </nav>
        
    <main>
        <div id="intercom-main">
            <h2 class="section-title">Lab Workbench</h2>
            
            <div class="status-panel">
                <span id="connection-dot" class="status-dot offline"></span>
                <span id="connection-text">UPLINK_STBY</span>
                <div class="audio-meter" id="audio-meter-container" style="margin-left: 20px;">
                    <div id="audio-level"></div>
                </div>
                <span id="lab-version" style="margin-left: auto; color: #555;">v3.3.1</span>
            </div>

            <div id="chat-console">
                <div class="system-msg">Establishing Workbench Connection...</div>
            </div>

            <div id="input-container">
                <button id="mic-btn" class="icon-btn" title="Toggle Microphone">🎤</button>
                <input type="text" id="text-input" placeholder="Initiate query or command..." autofocus>
                <button id="send-btn" class="icon-btn">SEND</button>
            </div>
        </div>

    </main>

    <script src="mission-control.js?v=94e04f0a"></script>
    <script src="intercom_v2.js?v=35212657"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Tool Log: Global render helper (called from intercom_v2.js)
            window.renderToolLogEntry = function(entry) {
                const container = document.getElementById('tool-log-container');
                const countBadge = document.getElementById('tool-log-count');
                if (!container) return;

                // Remove empty placeholder if present
                const empty = container.querySelector('.tool-empty');
                if (empty) empty.remove();

                // Cap at 50 entries (remove oldest)
                while (container.children.length >= 50) {
                    container.removeChild(container.lastElementChild);
                }

                const card = document.createElement('details');
                card.className = 'tool-card';
                card.innerHTML = `
                    <summary>
                        <span class="tool-timestamp">${entry.time || '--:--:--'}</span>
                        <span class="tool-node-badge">${entry.node || '?'}</span>
                        <span class="tool-name">${entry.tool || 'unknown_tool'}</span>
                    </summary>
                    <div class="tool-card-body">
                        ${entry.params ? `<div class="param-row"><span class="param-key">params:</span><span class="param-val">${escapeHtml(JSON.stringify(entry.params))}</span></div>` : ''}
                        ${entry.output_path ? `<div class="param-row"><span class="param-key">output:</span><a class="output-link" href="file://${entry.output_path}" target="_blank">${entry.output_path}</a></div>` : ''}
                        ${entry.error ? `<div class="param-row" style="color:#e57373;"><span class="param-key">error:</span><span class="param-val">${escapeHtml(entry.error)}</span></div>` : ''}
                        ${entry.detail ? `<div style="margin-top:4px;color:#888;">${escapeHtml(entry.detail)}</div>` : ''}
                    </div>
                `;

                // Insert newest at top
                container.insertBefore(card, container.firstChild);

                // Update badge count
                if (countBadge) countBadge.textContent = container.children.length;
            };

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }
        });
    </script>
</body>
</html>
